name: Build Terminal with Cursor Smear

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      SOLUTION: OpenConsole.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup VS
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $instance = & $vsWhere -products * -format json | ConvertFrom-Json | Select-Object -First 1
          if (-not $instance) {
              throw "No VS installation found"
          }
          Write-Host "Found: $($instance.displayName) at $($instance.installationPath)"
          Write-Host "Product line version: $($instance.catalog_productLineVersion)"

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Write-Host "=== Restoring NuGet packages ==="
          # Use the bundled nuget.exe with public package sources
          .\dep\nuget\nuget.exe install .\dep\nuget\packages.config -OutputDirectory .\packages -Source "https://api.nuget.org/v3/index.json" -NonInteractive
          Write-Host "=== Bundled restore exit code: $LASTEXITCODE ==="

      - name: Build (continue on test failures)
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vsWhere -products * -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          .\dep\nuget\nuget.exe install .\dep\nuget\packages.config -OutputDirectory .\packages -Source "https://api.nuget.org/v3/index.json" -NonInteractive
          # Build with ContinueOnError so test projects (missing Taef) don't block the main build
          & $msbuild $env:SOLUTION /p:Configuration=Release /p:Platform=x64 /m /p:ContinueOnError=WarnAndContinue
          Write-Host "Build completed. Checking for AtlasEngine compilation..."

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Smear-Build
          path: |
            bin\x64\Release\**
          if-no-files-found: warn

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Smear-Build
          path: |
            bin\x64\Release\**
          if-no-files-found: error
