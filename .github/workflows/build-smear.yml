name: Build Terminal with Cursor Smear

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      SOLUTION: OpenConsole.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup VS
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $instance = & $vsWhere -products * -format json | ConvertFrom-Json | Select-Object -First 1
          if (-not $instance) {
              throw "No VS installation found"
          }
          Write-Host "Found: $($instance.displayName) at $($instance.installationPath)"
          Write-Host "Product line version: $($instance.catalog_productLineVersion)"

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Write-Host "=== Restoring NuGet packages ==="
          # Use the bundled nuget.exe with public package sources
          .\dep\nuget\nuget.exe install .\dep\nuget\packages.config -OutputDirectory .\packages -Source "https://api.nuget.org/v3/index.json" -NonInteractive
          Write-Host "=== Bundled restore exit code: $LASTEXITCODE ==="

      - name: Setup stub packages
        shell: pwsh
        run: |
          # Create stub for private ThemeHelpers NuGet package
          $themeHelpersPath = "packages\Microsoft.Internal.Windows.Terminal.ThemeHelpers.0.8.250811004\build\native"
          New-Item -ItemType Directory -Force -Path $themeHelpersPath | Out-Null

          $header = @'
          #pragma once
          #include <windows.h>
          inline void TerminalTrySetTransparentBackground(bool) noexcept {}
          inline void TerminalTrySetAutoCompleteAnimationsWhenOccluded(IUnknown*, bool) noexcept {}
          inline HRESULT TerminalTrySetWindowAssociatedProcesses(HWND, DWORD, HANDLE*) noexcept { return S_FALSE; }
          '@
          Set-Content "$themeHelpersPath\TerminalThemeHelpers.h" $header -Encoding Ascii

          $targets = '<?xml version="1.0" encoding="utf-8"?>
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <ItemGroup>
              <AdditionalIncludeDirectories Include="$(MSBuildThisFileDirectory)" />
            </ItemGroup>
          </Project>'
          Set-Content "$themeHelpersPath\Microsoft.Internal.Windows.Terminal.ThemeHelpers.targets" $targets -Encoding Ascii

          # Create stub for private Taef package (test framework - needed by test projects)
          $taefPath = "packages\Microsoft.Taef.10.100.251104001\build"
          New-Item -ItemType Directory -Force -Path $taefPath | Out-Null
          $taefTargets = '<?xml version="1.0" encoding="utf-8"?>
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003" />'
          Set-Content "$taefPath\Microsoft.Taef.targets" $taefTargets -Encoding Ascii
          Set-Content "$taefPath\Microsoft.Taef.props" $taefTargets -Encoding Ascii

          Write-Host "Stub packages created"

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          .\dep\nuget\nuget.exe install .\dep\nuget\packages.config -OutputDirectory .\packages -Source "https://api.nuget.org/v3/index.json" -NonInteractive

      - name: Build
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vsWhere -products * -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild $env:SOLUTION /p:Configuration=Release /p:Platform=x64 /m /p:ContinueOnError=WarnAndContinue

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Smear-Build
          path: |
            bin\x64\Release\**
          if-no-files-found: warn

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Smear-Build
          path: |
            bin\x64\Release\**
          if-no-files-found: error
