name: Build Terminal with Cursor Smear

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      SOLUTION: OpenConsole.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup VS
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $instance = & $vsWhere -products * -format json | ConvertFrom-Json | Select-Object -First 1
          if (-not $instance) {
              throw "No VS installation found"
          }
          Write-Host "Found: $($instance.displayName) at $($instance.installationPath)"
          Write-Host "Product line version: $($instance.catalog_productLineVersion)"

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Write-Host "=== Reverting NuGet config for CI ==="
          # The terminal repo has packages restored via git restored packages dir
          # or via nuget restore. Try MSBuild restore targets.
          nuget restore $env:SOLUTION -NonInteractive -Verbosity detailed 2>&1 | Select-String -Pattern "error|restored|not found|missing"

      - name: Build
        shell: pwsh
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vsWhere -products * -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild $env:SOLUTION /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-Smear-Build
          path: |
            bin\x64\Release\**
          if-no-files-found: error
